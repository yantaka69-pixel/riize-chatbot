services:
  - type: web
    name: riize-chat-server
    env: node
    region: singapore
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /var/data/riize-chat.db
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: OPENAI_MODEL
        value: gpt-3.5-turbo
      - key: ADMIN_PASSWORD
        generateValue: true
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
